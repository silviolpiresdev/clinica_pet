{% extends 'base.html' %}

{% block title %}
Listagem de Consultas
{% endblock title %}

{% block content %}
<div class="box box-primary">
    <div class="box-header with-border">
        <h3 class="box-title">Listagem de Consultas</h3>
    </div>

    <div class="box-body">
        <table class="table">
            <thead>
               <tr>
                   <th>Data</th>
                   <th>Motivo</th>
                   <th>Peso Atual</th>
               </tr>
            </thead>
            <tbody>
                {% for c in consulta %}
                <tr>
                    <td>{{ c.data }}</td>
                    <td>{{ c.motivo_consulta }}</td>
                    <td>{{ c.peso_atual }} kg</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <hr>
        <a href="{% url 'cadastrar_consulta' consulta.first.pet.id %}">
            <button class="btn btn-primary">Nova Consulta</button>
        </a>
    </div>
</div>
{% endblock content %}
